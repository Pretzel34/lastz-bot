name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: .\build_windows.bat
        shell: cmd

      - name: Get version from tag
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          echo "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        shell: powershell

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build installer
        run: |
          $env:PATH += ";C:\Program Files (x86)\NSIS"
          makensis /DAPP_VERSION=${{ steps.version.outputs.version }} installer.nsi
        shell: powershell

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Last Z Bot v${{ steps.version.outputs.version }}
          body: |
            ## Release v${{ steps.version.outputs.version }}

            ### Installation
            1. Download `LastZBot-v${{ steps.version.outputs.version }}-Setup.exe` below
            2. Run it — app installs to Program Files and a Start Menu shortcut is created
            3. Future updates install automatically when you launch the app

            ### What's New
            See commit history for details.
          draft: false
          prerelease: false
          files: dist/LastZBot-v${{ steps.version.outputs.version }}-Setup.exe
