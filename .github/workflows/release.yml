name: Build & Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          NEW_TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "version=${NEW_TAG#v}" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: .\build_windows.bat
        shell: cmd

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build installer
        run: |
          $env:PATH += ";C:\Program Files (x86)\NSIS"
          makensis /DAPP_VERSION=${{ steps.version.outputs.version }} installer.nsi
        shell: powershell

      - name: Create tag and GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Last Z Bot ${{ steps.version.outputs.tag }}
          body: |
            ## Release ${{ steps.version.outputs.tag }}

            ### Installation
            1. Download `LastZBot-v${{ steps.version.outputs.version }}-Setup.exe` below
            2. Run it — app installs to Program Files and a Start Menu shortcut is created
            3. Future updates install automatically when you launch the app

            ### What's New
            See commit history for details.
          draft: false
          prerelease: false
          files: dist/LastZBot-v${{ steps.version.outputs.version }}-Setup.exe
