name: Build & Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version and set tag
        id: version
        shell: bash
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          if [ -z "$LATEST" ]; then
            NEW_TAG="v1.0.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "version=${NEW_TAG#v}" >> $GITHUB_OUTPUT

      - name: Update version.py
        shell: bash
        run: |
          echo "__version__ = \"${{ steps.version.outputs.version }}\"" > version.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: .\build_windows.bat
        shell: cmd

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build installer
        run: |
          $env:PATH += ";C:\Program Files (x86)\NSIS"
          makensis /DAPP_VERSION=${{ steps.version.outputs.version }} installer.nsi
        shell: powershell

      - name: Create tag and GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Last Z Bot ${{ steps.version.outputs.tag }}
          body: |
            ## Release ${{ steps.version.outputs.tag }}

            ### Installation
            1. Download `LastZBot-v${{ steps.version.outputs.version }}-Setup.exe` below
            2. Run it — app installs to Program Files and a Start Menu shortcut is created
            3. Future updates install automatically when you launch the app

            ### What's New
            See commit history for details.
          draft: false
          prerelease: false
          files: dist/LastZBot-v${{ steps.version.outputs.version }}-Setup.exe
